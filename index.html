<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Schiettent v2.0: De 30-Zinnen Missie</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --pol: #1e3a8a; --bg: #020617; --gold: #fbbf24; --danger: #dc2626; --success: #16a34a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        #game-container { width: 100vw; height: 100vh; position: relative; }
        
        #hud { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); z-index: 100; border-bottom: 2px solid var(--pol); }
        .stat-box { text-align: center; }
        .stat-val { display: block; font-size: 1.5em; font-weight: bold; color: var(--gold); }

        .target { 
            position: absolute; padding: 15px 25px; background: #1e293b; border: 2px solid var(--pol);
            border-radius: 8px; font-weight: bold; white-space: nowrap; cursor: crosshair;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        }
        .v-deelwoord { color: var(--danger); text-decoration: underline; padding: 0 4px; }
        .v-deelwoord:hover { background: var(--danger); color: white; border-radius: 3px; }

        #input-overlay {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e293b; padding: 40px; border: 4px solid var(--pol); border-radius: 20px;
            z-index: 200; width: 600px; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }
        #active-input { width: 100%; padding: 15px; font-size: 1.2em; margin-top: 20px; background: #0f172a; color: white; border: 1px solid var(--gold); text-align: center; }

        .leaderboard { position: fixed; bottom: 20px; left: 20px; background: rgba(30,41,59,0.7); padding: 20px; border-radius: 10px; width: 250px; font-size: 0.8em; }
        .admin-btn { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; cursor: pointer; background: none; border: 1px solid white; color: white; padding: 5px; font-size: 0.6em; }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat-box">AGENT<span id="display-naam" class="stat-val">...</span></div>
    <div class="stat-box">TIJD<span id="timer" class="stat-val">60</span></div>
    <div class="stat-box">SCORE<span id="score" class="stat-val">0</span></div>
</div>

<div id="game-container">
    <div id="start-screen" style="position:absolute; top:40%; left:50%; transform:translate(-50%, -50%); text-align:center;">
        <h1>RECHERCHE SCHIETTENT v2.0</h1>
        <p>Elimineer de passieve vorm. Schrijf actief in de IK-vorm.</p>
        <input type="text" id="speler-naam" placeholder="Je voornaam..." style="padding:15px; width:300px; text-align: center; border-radius: 5px; border: none;"><br><br>
        <button onclick="startGame()" style="padding:15px 50px; background:var(--pol); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">START TRAINING</button>
    </div>
</div>

<div id="input-overlay">
    <h3 style="color:var(--gold)">Herschrijf naar ACTIEF</h3>
    <p id="original-sentence" style="font-style:italic; color: #cbd5e1;"></p>
    <input type="text" id="active-input" placeholder="Typ je zin in de ik-vorm..." autocomplete="off">
    <p style="font-size: 0.75em; margin-top: 15px; color: #94a3b8;">Focus op de ik-vorm in de verleden tijd.</p>
</div>

<div class="leaderboard">
    <strong>🏆 TOP RECHERCHEURS</strong>
    <div id="leader-list"></div>
</div>

<button class="admin-btn" onclick="exportScores()">EXPORT DATA (CSV)</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBOo2LzR1IBnsiBR2SCwPJABtaRv0tpKQ4",
        authDomain: "speeltuin-recherche.firebaseapp.com",
        databaseURL: "https://speeltuin-recherche-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "speeltuin-recherche",
        appId: "1:499912834123:web:3c84cbf4d5eb13131961ce"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

   const casussen = [
        {pas: "Dat de verdachte een klein doorzichtig zakje weggooide, werd door mij <span class='v-deelwoord'>gezien</span>.", corr: "ik zag dat de verdachte"},
        {pas: "Het signalement van de verdwaalde oude dame werd door mij in mijn notitieblok <span class='v-deelwoord'>genoteerd</span>.", corr: "ik noteerde het signalement"},
        {pas: "Dat de melder veel overlast van de buren ervaarde, werd door hem aan mij <span class='v-deelwoord'>verklaard</span>.", corr: "ik hoorde dat de melder verklaarde"},
        {pas: "De bewuste locatie in het park werd door de surveillance snel <span class='v-deelwoord'>bereikt</span>.", corr: "ik bereikte de locatie"},
        {pas: "Het verdachte voertuig werd door mij onopvallend in de gaten <span class='v-deelwoord'>gehouden</span>.", corr: "ik hield het voertuig in de gaten"},
        {pas: "De opgeslagen camerabeelden werden door mijn collega direct <span class='v-deelwoord'>uitgekeken</span>.", corr: "ik zag dat mijn collega"},
        {pas: "Luide kreten uit de woning werden door mij duidelijk <span class='v-deelwoord'>waargenomen</span>.", corr: "ik hoorde dat er"},
        {pas: "De aanwezige getuige werd door mij voor een korte verklaring apart <span class='v-deelwoord'>genomen</span>.", corr: "ik nam de getuige apart"},
        {pas: "Het vermoedelijke vluchtpad van de dader werd door mij <span class='v-deelwoord'>vastgesteld</span>.", corr: "ik stelde het vluchtpad vast"},
        {pas: "Tijdens de surveillance werd door mij scherp op de omgeving <span class='v-deelwoord'>gelet</span>.", corr: "ik lette op de omgeving"},
        {pas: "Het getoonde ID-bewijs werd door mij op echtheid <span class='v-deelwoord'>gecontroleerd</span>.", corr: "ik controleerde het id-bewijs"},
        {pas: "De rechterbinnenzak van de verdachte werd door collega Van der Zande <span class='v-deelwoord'>gevoeld</span>.", corr: "ik zag dat mijn collega"},
        {pas: "Een scherp mes werd door mij in de rechtermouw <span class='v-deelwoord'>aangetroffen</span>.", corr: "ik voelde dat er"},
        {pas: "De mondelinge verklaring werd door mij direct op papier <span class='v-deelwoord'>gezet</span>.", corr: "ik zette de verklaring op papier"},
        {pas: "Het voertuig van de verdachte werd door mijn bijrijder grondig <span class='v-deelwoord'>doorzocht</span>.", corr: "ik zag dat mijn collega het voertuig doorzocht"},
        {pas: "De verse braakschade aan de achterdeur werd door de recherche <span class='v-deelwoord'>onderzocht</span>.", corr: "ik onderzocht de braakschade"},
        {pas: "Aan de bestuurder werd door mij om een geldig ID-bewijs <span class='v-deelwoord'>gevraagd</span>.", corr: "ik vroeg om een id-bewijs"},
        {pas: "De aangetroffen softdrugs werden door mij direct in beslag <span class='v-deelwoord'>genomen</span>.", corr: "ik nam de drugs in beslag"},
        {pas: "Het officiële proces-verbaal van bevindingen werd door mij <span class='v-deelwoord'>opgemaakt</span>.", corr: "ik maakte het proces-verbaal op"},
        {pas: "De bekeuring voor wildplassen werd door de verbalisant <span class='v-deelwoord'>uitgereikt</span>.", corr: "ik reikte de bekeuring uit"},
        {pas: "De rennende verdachte werd door mij ter hoogte van de kerk <span class='v-deelwoord'>aangehouden</span>.", corr: "ik hield de verdachte aan"},
        {pas: "De agressieve verdachte werd door de agent direct <span class='v-deelwoord'>geboeid</span>.", corr: "ik zag dat mijn collega de verdachte boeide"},
        {pas: "Tijdens de aanhouding werd door mij noodgedwongen pepperspray <span class='v-deelwoord'>gebruikt</span>.", corr: "ik gebruikte pepperspray"},
        {pas: "De verdachte werd door mij met een gecontroleerde beweging tegen de grond <span class='v-deelwoord'>gewerkt</span>.", corr: "ik werkte de verdachte tegen de grond"},
        {pas: "De vluchtende man werd door mij tijdens de achtervolging <span class='v-deelwoord'>getackeld</span>.", corr: "ik tackelde de vluchtende man"},
        {pas: "De diensthond werd door de geleider ter ondersteuning <span class='v-deelwoord'>ingezet</span>.", corr: "ik zag dat de geleider"},
        {pas: "De verdachte werd door mij stevig in de boeien <span class='v-deelwoord'>geslagen</span>.", corr: "ik sloeg de verdachte in de boeien"},
        {pas: "Er werd door mij een gericht waarschuwingsschot in de lucht <span class='v-deelwoord'>gelost</span>.", corr: "ik loste een waarschuwingsschot"},
        {pas: "De aangehouden verdachte werd door mij naar het hoofdbureau <span class='v-deelwoord'>overgebracht</span>.", corr: "ik bracht de verdachte over"},
        {pas: "De fysieke weerstand werd door mij met gepast geweld <span class='v-deelwoord'>gebroken</span>.", corr: "ik brak de weerstand"}
    ];

    let score = 0, timeLeft = 60, gameActive = false;

    function startGame() {
        const n = document.getElementById('speler-naam').value.trim();
        if(!n) return alert("Agent, voer je voornaam in.");
        document.getElementById('display-naam').innerText = n;
        document.getElementById('start-screen').style.display = "none";
        gameActive = true;
        
        let timerInt = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { clearInterval(timerInt); endGame(); }
        }, 1000);

        spawn();
    }

    function spawn() {
        if(!gameActive) return;
        const opgave = casussen[Math.floor(Math.random() * casussen.length)];
        const div = document.createElement('div');
        div.className = 'target';
        div.innerHTML = opgave.pas;
        div.style.top = (Math.random() * 60 + 20) + "%";
        div.style.left = "-800px";
        document.getElementById('game-container').appendChild(div);

        let pos = -800;
        let speed = 2.5 + (score / 40); 

        const move = setInterval(() => {
            if(!gameActive) { clearInterval(move); div.remove(); return; }
            pos += speed;
            div.style.left = pos + "px";
            if(pos > window.innerWidth) { clearInterval(move); div.remove(); spawn(); }
        }, 20);

        div.querySelector('.v-deelwoord').onclick = () => {
            clearInterval(move);
            showInput(opgave, div);
        };
    }

    function showInput(opgave, div) {
        document.getElementById('original-sentence').innerText = div.innerText;
        document.getElementById('input-overlay').style.display = "block";
        const input = document.getElementById('active-input');
        input.value = "";
        input.focus();
        
        input.onkeypress = (e) => {
            if(e.key === 'Enter') {
                const gok = input.value.toLowerCase().trim();
                const targetVerb = opgave.corr.split(' ')[1]; 
                if(gok.includes("ik") && gok.includes(targetVerb.substring(0, 4))) {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    document.getElementById('input-overlay').style.display = "none";
                    div.remove();
                    spawn();
                } else {
                    alert("FOUT! Schrijf in de actieve ik-vorm.");
                }
            }
        };
    }

    function endGame() {
        gameActive = false;
        const naam = document.getElementById('display-naam').innerText;
        db.ref('leaderboard_v2').push({ naam, score, datum: new Date().toLocaleString() });
        alert("Training voltooid, " + naam + "! Jouw score: " + score);
        location.reload();
    }

    db.ref('leaderboard_v2').orderByChild('score').limitToLast(5).on('value', snap => {
        const list = document.getElementById('leader-list');
        list.innerHTML = "";
        let entries = [];
        snap.forEach(s => entries.push(s.val()));
        entries.reverse().forEach((e, i) => {
            list.innerHTML += `<div>#${i+1} ${e.naam} - ${e.score}</div>`;
        });
    });

    function exportScores() {
        db.ref('leaderboard_v2').once('value', snap => {
            let csv = "Voornaam,Score,Datum\n";
            snap.forEach(s => {
                const d = s.val();
                csv += `${d.naam},${d.score},${d.datum}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'resultaten_schiettent.csv');
            a.click();
        });
    }
</script>
</body>
</html>
